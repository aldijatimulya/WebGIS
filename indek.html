<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GeoClimate Insight</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

#map{
height:90vh;
}

</style>

</head>

<body>

<header>
<h1>GeoClimate Insight</h1>
<p>Environmental Monitoring WebGIS</p>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-2.5,118],5);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

L.marker([-3.78,103.54])
.addTo(map)
.bindPopup("Kabupaten Lahat");

</script>

</body>
</html>
