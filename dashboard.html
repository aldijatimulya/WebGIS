<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Dashboard GeoClimate Indonesia</title>

<link rel="stylesheet"
href="css/style.css">

<script
src="https://cdn.jsdelivr.net/npm/chart.js">
</script>

<style>

.dashboard{

padding:30px;

background:#f1f5f9;

min-height:100vh;
}

.cards{

display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:40px;
}

.dcard{

background:white;

padding:20px;

width:250px;

border-radius:10px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);
}

.chart-box{

background:white;

padding:20px;

border-radius:10px;

margin-top:20px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">

🌎 GeoClimate Indonesia

</div>

<div class="menu">

<a href="index.html">Home</a>

<a href="webgis.html">WebGIS</a>

<a href="dashboard.html">Dashboard</a>

</div>

</div>

<div class="dashboard">

<h1>

<div class="filter-box">

<h3>Filter Wilayah</h3>

<select id="provinsi">
<option>Indonesia</option>
<option>Sumatera Selatan</option>
<option>Jawa Barat</option>
<option>Kalimantan Timur</option>
</select>

<select id="kabupaten">
<option>Semua Kabupaten</option>
</select>

<select id="tahun">
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option selected>2024</option>
</select>

<button onclick="updateDashboard()">
Tampilkan
</button>

</div>

Dashboard Monitoring Indonesia

</h1>

<br>

<div class="cards">

<div class="dcard">

<h3>🌧 Curah Hujan</h3>

<h2>2.450 mm</h2>

</div>

<div class="dcard">

<h3>🌿 NDVI</h3>

<h2>0.67</h2>

</div>

<div class="dcard">

<h3>🌡 LST</h3>

<h2>31.2 °C</h2>

</div>

<div class="dcard">

<h3>🔥 Hotspot</h3>

<h2>125</h2>

</div>

</div>

<div class="chart-box">

<h3>
Curah Hujan Bulanan
</h3>

<canvas id="rainChart"></canvas>

</div>

<div class="chart-box">

<h3>
NDVI Bulanan
</h3>

<canvas id="ndviChart"></canvas>

</div>

</div>

<script>

new Chart(
document.getElementById('rainChart'),
{
type:'line',
data:{
labels:[
'Jan','Feb','Mar',
'Apr','Mei','Jun',
'Jul','Agu','Sep',
'Okt','Nov','Des'
],

datasets:[{
label:'Curah Hujan',

data:[
250,210,280,
300,350,280,
190,120,110,
150,240,290
]
}]
}
});

new Chart(
document.getElementById('ndviChart'),
{
type:'bar',

data:{
labels:[
'Jan','Feb','Mar',
'Apr','Mei','Jun',
'Jul','Agu','Sep',
'Okt','Nov','Des'
],

datasets:[{
label:'NDVI',

data:[
0.72,0.74,0.76,
0.79,0.81,0.75,
0.69,0.65,0.63,
0.66,0.70,0.73
]
}]
}
});

</script>
<script src="js/dashboard.js"></script>
</body>

<div class="chart-box">

<h3>
Data Statistik
</h3>

<table id="dataTable">

<tr>
<th>Bulan</th>
<th>Curah Hujan</th>
<th>NDVI</th>
</tr>

<tr>
<td>Januari</td>
<td>250</td>
<td>0.72</td>
</tr>

<tr>
<td>Februari</td>
<td>210</td>
<td>0.74</td>
</tr>

<tr>
<td>Maret</td>
<td>280</td>
<td>0.76</td>
</tr>

</table>

</div>
</html>
