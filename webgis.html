<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>GeoClimate WebGIS</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
}

.sidebar{

position:absolute;

left:0;

top:0;

width:300px;

height:100vh;

background:#0f172a;

color:white;

padding:20px;

z-index:1000;

overflow:auto;

}

#map{

position:absolute;

left:300px;

width:calc(100% - 300px);

height:100vh;

}

.card{

background:#1e293b;

padding:15px;

margin-bottom:15px;

border-radius:10px;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>
GeoClimate
</h2>

<hr>

<div class="card">

<h3>Indonesia</h3>

<p>
Monitoring Nasional
</p>

</div>

<h3>Layer</h3>

<label>
<input type="checkbox" checked>
Batas Administrasi
</label>

<br><br>

<label>
<input type="checkbox">
Curah Hujan
</label>

<br><br>

<label>
<input type="checkbox">
NDVI
</label>

<br><br>

<label>
<input type="checkbox">
LST
</label>

<br><br>

<label>
<input type="checkbox">
Deforestasi
</label>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map')
.setView([-2.5,118],5);

var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

var esri = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

osm.addTo(map);

var baseMaps = {

"OpenStreetMap":osm,

"Satellite":esri

};

L.control.layers(baseMaps).addTo(map);

</script>

</body>

</html>
